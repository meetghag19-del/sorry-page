<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:600px;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    animation:fadeIn 1s ease;
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
    font-size:42px;
}

p{
    color:#555;
    font-size:20px;
    line-height:1.8;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff2d55;
}

#message{
    margin-top:25px;
    font-size:22px;
    color:#ff2d55;
    font-weight:bold;
    display:none;
}

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div class="card">
    <h1>I'm Sorry Mansi bala ❤️</h1>

    <p>
        I know I made mistakes, and I'm truly sorry.
        I never wanted to hurt you.
        Mansi khara sorry naa tuch ahe ree maja kade tuja sati 
        kay pan karin me Maaf kar naa plssssss Bala 
    </p>

    <button onclick="forgive()">Click Here</button>

    <div id="message">
        Dhanyawad appan message bagatla❤️ <br>
        I LOVEEEEE YOUUUUUUUU 
        
    </div>
</div>

<script>
function forgive(){
    document.getElementById("message").style.display="block";
}

function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(3+Math.random()*4)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,100);
</script>

</body>
</html>
